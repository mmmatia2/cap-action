<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cap Me Action</title>
    <link rel="stylesheet" href="../shared-ui/tokens.css" />
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        width: 336px;
        max-height: 600px;
        overflow: hidden;
        font-family: var(--font-sans);
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.78) 0%, rgba(237, 242, 247, 0.92) 100%),
          linear-gradient(135deg, rgba(36, 89, 155, 0.08) 0%, transparent 42%);
        font-size: 14px;
      }

      .popup {
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: 600px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
      }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .logo img {
        display: block;
        width: 34px;
        height: 34px;
      }

      .title-container {
        flex: 1;
      }

      .title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }

      .subtitle {
        margin: 4px 0 0 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.45;
      }

      .main-content {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1 1 auto;
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .capture-btn {
        width: 100%;
        padding: 14px;
        border: 1px solid var(--accent);
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
        transition: background-color 0.2s ease, transform 0.2s ease;
        box-shadow: var(--shadow-sm);
      }

      .capture-btn:hover {
        background: linear-gradient(180deg, var(--accent-strong) 0%, #133a66 100%);
      }

      .capture-icon {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .capture-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: white;
      }

      .capture-dot.recording {
        border-radius: 3px;
        background: #fca5a5;
      }

      .status-text {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.88);
        margin: 0;
        line-height: 1.4;
      }

      .actions-grid {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .status-panel {
        padding: 12px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .status-line {
        margin: 0;
        font-size: 12px;
        color: var(--text);
        line-height: 1.45;
        word-break: break-word;
      }

      .status-line.muted {
        color: var(--muted);
      }

      .inline-actions {
        display: flex;
        gap: 8px;
      }

      .inline-actions .action-btn {
        flex: 1;
        justify-content: center;
        padding: 9px 10px;
      }

      .advanced-panel {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.62);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
      }

      .advanced-panel summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted-strong);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .advanced-panel summary::-webkit-details-marker {
        display: none;
      }

      .advanced-panel summary::after {
        content: "Show";
        color: var(--muted);
        text-transform: none;
        letter-spacing: normal;
        font-size: 12px;
        font-weight: 600;
      }

      .advanced-panel[open] summary::after {
        content: "Hide";
      }

      .advanced-panel__body {
        padding: 0 12px 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .advanced-note {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .action-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        text-decoration: none;
        box-shadow: var(--shadow-sm);
      }

      .action-btn:hover {
        border-color: var(--border-strong);
        background: var(--surface-2);
      }

      .section-header {
        display: flex;
        align-items: center;
        margin: 2px 0 0;
      }

      .section-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0;
      }

      .recent-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        overflow: visible;
      }

      .recent-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        transition: border-color 0.2s ease, background-color 0.2s ease;
      }

      .recent-item:hover {
        border-color: var(--border-strong);
        background: var(--surface-2);
      }

      .recent-thumb {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface-3);
        background-size: cover;
        background-position: center;
        flex-shrink: 0;
      }

      .recent-details {
        flex: 1;
        min-width: 0;
      }

      .recent-title {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .recent-meta {
        margin: 2px 0 0;
        font-size: 11px;
        color: var(--muted);
      }

      .empty-state,
      .empty {
        padding: 20px 14px;
        text-align: center;
        background: var(--surface-2);
        border: 1px dashed var(--border);
        border-radius: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        margin: 0;
      }

      .footer {
        padding: 10px 16px 12px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        align-items: center;
        background: rgba(255, 255, 255, 0.76);
        flex-shrink: 0;
      }

      .footer-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 0;
      }

      .footer-btn:hover {
        color: var(--text);
      }

      .footer-icon-btn {
        width: 30px;
        height: 30px;
        border: 1px solid var(--border);
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        background: var(--surface);
        cursor: pointer;
        box-shadow: var(--shadow-sm);
      }

      .footer-icon-btn:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: var(--surface-2);
      }

      .keyboard-hints {
        display: flex;
        gap: 4px;
        margin-top: 4px;
      }

      kbd {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 4px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.12);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <div class="logo"><img src="../icons/icon-mark.svg" alt="Cap Me Action icon" /></div>
        <div class="title-container">
          <h1 class="title">Cap Me Action</h1>
          <p class="subtitle">Capture browser workflows and open them in the editor.</p>
        </div>
      </header>

      <main class="main-content">
        <button id="captureToggle" class="capture-btn" type="button">
          <div class="capture-icon">
            <div class="capture-dot" id="captureDot"></div>
          </div>
          <span id="captureToggleLabel">Start Recording</span>
          <p id="captureStatus" class="status-text">Click to start capturing clicks & types</p>
          <div class="keyboard-hints">
            <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>R</kbd>
          </div>
        </button>

        <div class="actions-grid">
          <button id="openEditor" class="action-btn" type="button">
            <span>Open Last Capture in Editor</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          </button>
        </div>

        <details class="advanced-panel">
          <summary>Advanced Tools (Optional)</summary>
          <div class="advanced-panel__body">
            <p class="advanced-note">Use team sync after polishing SOPs in the editor. Raw captures are best kept local.</p>
            <div class="status-panel">
              <p class="section-title">Team Sync</p>
              <p id="authStateText" class="status-line muted">Auth: checking...</p>
              <p id="syncStateText" class="status-line muted">Sync: checking...</p>
              <div class="inline-actions">
                <button id="syncSignIn" class="action-btn" type="button">Sign In</button>
                <button id="syncSignOut" class="action-btn" type="button">Sign Out</button>
              </div>
              <button id="checkLocalEditor" class="action-btn" type="button">
                <span>Check Local Dev Editor</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"></path><path d="M12 16v6"></path><path d="m4.93 4.93 4.24 4.24"></path><path d="m14.83 14.83 4.24 4.24"></path><path d="M2 12h6"></path><path d="M16 12h6"></path><path d="m4.93 19.07 4.24-4.24"></path><path d="m14.83 9.17 4.24-4.24"></path></svg>
              </button>
            </div>
          </div>
        </details>

        <div class="section-header">
          <h2 class="section-title">Recent Captures</h2>
        </div>
        
        <div id="recentCaptureList" class="recent-list">
          <p class="empty-state">Loading captures...</p>
        </div>
      </main>

      <footer class="footer">
        <button
          id="openInspectorFooter"
          class="footer-icon-btn"
          type="button"
          title="Open advanced diagnostics and configuration"
          aria-label="Open advanced diagnostics and configuration"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.02a1.65 1.65 0 0 0 .98-1.5V3a2 2 0 1 1 4 0v.09c0 .68.4 1.3 1.02 1.57.62.26 1.34.12 1.82-.35l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.48.48-.61 1.2-.35 1.82.27.62.9 1.02 1.57 1.02H21a2 2 0 1 1 0 4h-.09c-.68 0-1.3.4-1.51 1z"></path></svg>
        </button>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
