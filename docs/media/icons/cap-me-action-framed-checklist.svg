<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Cap Me Action framed checklist icon</title>
  <desc id="desc">A checklist document inside a capture frame with a recording dot.</desc>
  <defs>
    <linearGradient id="paperFold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e6ec1"/>
      <stop offset="100%" stop-color="#18477d"/>
    </linearGradient>
    <linearGradient id="paperShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8fd"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#24599b" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="58" y="58" width="396" height="396" rx="44" fill="#ffffff" stroke="#d7e3f2" stroke-width="6" filter="url(#tileShadow)"/>

  <path d="M122 146v-28c0-10 8-18 18-18h36" fill="none" stroke="#24599b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M390 146v-28c0-10-8-18-18-18h-38" fill="none" stroke="#24599b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M122 366v28c0 10 8 18 18 18h36" fill="none" stroke="#24599b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M390 366v28c0 10-8 18-18 18h-38" fill="none" stroke="#24599b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="168" cy="162" r="20" fill="#ef4444"/>

  <path d="M196 128h120l44 44v182c0 16-13 28-28 28H196c-16 0-28-12-28-28V156c0-16 12-28 28-28z" fill="url(#paperShade)" stroke="#18477d" stroke-width="16" stroke-linejoin="round"/>
  <path d="M316 128v44h44" fill="none" stroke="url(#paperFold)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M208 208l20 20 36-38" fill="none" stroke="#18477d" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M208 266l20 20 36-38" fill="none" stroke="#18477d" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M208 324l20 20 36-38" fill="none" stroke="#18477d" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M286 218h48" fill="none" stroke="#24599b" stroke-width="18" stroke-linecap="round"/>
  <path d="M286 276h48" fill="none" stroke="#24599b" stroke-width="18" stroke-linecap="round"/>
  <path d="M286 334h48" fill="none" stroke="#24599b" stroke-width="18" stroke-linecap="round"/>
