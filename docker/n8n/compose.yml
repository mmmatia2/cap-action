name: cap-me-action-n8n

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: cap-me-action-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      TZ: America/Sao_Paulo
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5679
      WEBHOOK_URL: http://localhost:5679/
      N8N_SECURE_COOKIE: "false"
    volumes:
      - cap_me_action_n8n_data:/home/node/.n8n
      - ./artifacts/sops:/home/node/.n8n-files/cap-me-action-sops

volumes:
  cap_me_action_n8n_data:
    name: cap_me_action_n8n_data
